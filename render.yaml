# Render Blueprint: New → Blueprint → connect repo → apply.
# Secrets stay in Render’s Environment tab (never commit `.env`; never use localhost URLs in Production).
#
# After deploy set (examples): DATABASE_URL, GOOGLE_CLIENT_*, GEMINI_* as needed:
#   API_PUBLIC_URL = https://<this-service>.onrender.com           # origin ONLY (no /api/...path)
#   PUBLIC_APP_URL = https://<your-app>.vercel.app
#   CORS_ORIGIN    = https://<your-app>.vercel.app
# Then on Vercel Production: VITE_API_ORIGIN = same as API_PUBLIC_URL; redeploy the site.
#
# Database: use Supabase Postgres (or Neon)—skip “Postgres on Render” unless you want a second DB.
services:
  - type: web
    name: scent-cast-api
    runtime: node
    plan: free
    region: oregon
    healthCheckPath: /api/healthz
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
