kind = "web"
previewPath = "/"
title = "Scent Cast"
version = "1.0.0"
id = "artifacts/scent-cast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18716

[services.development]
run = "pnpm --filter @workspace/scent-cast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scent-cast", "run", "build" ]
publicDir = "artifacts/scent-cast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18716"
BASE_PATH = "/"
